<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="keywords" content="gerador de Senhas">

    <link rel="stylesheet" href="./assets/style/app-pwd-styles.css">

    <script src="./assets/js/app-pwd-logic.js" defer></script>

    <title>Gerador de Senhas - SENAI-SP</title>
</head>
<body>
    <!-- Container principal que envolve toda a aplicação do APP geradir de senha  -->
    <main class="app-pwd">

        <!-- Cabeçalho dinâmico que exibe data/hora atual e mensagem de boas-vindas -->
        <header class="app-pwd__header">

            <span class="app-pwd__datetime"></span>

            <span class="app-pwd__welcome"></span>

        </header>

        <!-- Seção principal que contém todos os elementos interativos do APP gerador de senhas -->
        <section class="app-pwd__main">

            <!-- Logo do gerador de senhas -->
            <img class="app-pwd__logo" src="./assets/img/logo-senai-sp.png" alt="Logo SENAI SP" >

            <!-- Container de entrada que agrupa o controle deslizante e opções de senha -->
            <div class="app-pwd__input">

                <!-- Exibição d tamanho selecionado da senha -->
                <span class="app-pwd__text">Gerador de Senhas: </span><span class="app-pwd__size"> caracteres</span>

                <!-- Controle deslizante para selecionar o tamanho da senha -->
                <input class="app-pwd__slider" type="range" min="8" max="16" value="8">

                <!-- Grupo de opções para personalização da senha -->
                 <div class="app-pwd__options">

                    <!-- Opção para incluir letras maiúsculas -->
                    <label class="app-pwd__option" name="uppercase-label">
                        <input type="checkbox" class="app-pwd__checkbox uppercase-check" name="uppercase" checked />
                        Letras maiúsculas (A-Z)
                    </label>

                    <!-- Opção para incluir letras minúsculas -->
                    <label class="app-pwd__option" name="lowercase-label">
                        <input type="checkbox" class="app-pwd__checkbox lower-check" name="lowercase" checked />
                        Letras minúsculas (a-z)
                    </label>

                    <!-- Opção para incluir números -->
                    <label class="app-pwd__option" name="numbers-label">
                        <input type="checkbox" class="app-pwd__checkbox numbers-check" name="numbers" checked />
                        Números (0-9)
                    </label>

                    <!-- Opção para incluir números -->
                    <label class="app-pwd__option" name="special-label">
                        <input type="checkbox" class="app-pwd__checkbox special-check" name="special" checked />
                        Caracteres especiais (!@#$%&*)
                    </label>

                    <!-- Container para os botões -->
                    <div class="app-pwd__button-container">
                        <button class="app-pwd__button">Gerar Nova Senha</button>
                        <button class="app-pwd__button--clear">Limpar</button>
                    </div>
                 </div>
            

            <!-- Container que exibe a senha gerada e permite cópia -->
            <div class="app-pwd__result hide">

                <span class="app-pwd__title">Sua nova senha foi gerada!</span>
                
                <span class="app-pwd__output"></span>
                
                <span class="app-pwd__tooltip">Clique na senha para copiar.👆</span>

            </div>

            <!-- Container que mantém o histórico das últimas senhas geradas -->
            <div class="app-pwd__history">

                <h2 class="app-pwd__history-title">Últimas senhas geradas:</h2>

                <ul class="app_pwd__history-list"></ul>

            </div>

        </section>
    </main>
</body>
</html>
